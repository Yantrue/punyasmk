<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Absensi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
    url('https://png.pngtree.com/background/20250104/original/pngtree-ramadan-kareem-background-with-night-landscape-and-mosque-silhouette-picture-image_15326163.jpg');
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:40px;
    color:#fff;
}

.header h1{
    font-size:26px;
    font-weight:700;
}

.header p{
    opacity:0.8;
}

/* BANNER */
.banner{
    margin-top:10px;
    display:inline-block;
    padding:6px 25px;
    border-radius:30px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
}

/* CARD */
.card-login{
    margin:40px auto;
    max-width:350px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    color:#fff;
}

/* INPUT */
.form-control{
    border-radius:30px;
    padding:12px;
}

/* BUTTON */
.btn-login{
    border-radius:30px;
    background:linear-gradient(90deg,#0d6efd,#6f42c1);
    border:none;
    color:#fff;
    padding:10px;
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px;
    font-size:13px;
    color:#fff;
    background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
    <h1>Sistem Absensi</h1>
    <p>SMKN 1 Kragilan</p>

    <div class="banner">
        🌙 Marhaban Ya Ramadhan ✨
    </div>
</div>

<div class="card-login">
    <p class="text-center">Masukkan username dan password</p>

    <form>
        <input type="text" class="form-control mb-3" placeholder="Username">
        <input type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-login w-100">Login</button>
    </form>
</div>

<div class="footer">
    © 2025 DiReplika oleh Myukun.
</div>

</body>
</html>
